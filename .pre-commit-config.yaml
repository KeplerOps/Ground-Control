fail_fast: true

repos:
  # =============================================================================
  # STAGE 1: Fast checks (linting, formatting, syntax)
  # =============================================================================

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
        exclude: ^backend/src/test/

  # Java formatting (Spotless via Gradle — auto-fix mode)
  - repo: local
    hooks:
      - id: spotless
        name: spotless (Java auto-format)
        entry: bash -c 'cd backend && ./gradlew spotlessApply -q'
        language: system
        files: ^backend/.*\.java$
        pass_filenames: false

  # Terraform formatting and validation
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.105.0
    hooks:
      - id: terraform_fmt
        files: ^deploy/terraform/
      - id: terraform_validate
        files: ^deploy/terraform/

  # =============================================================================
  # STAGE 2: Security
  # =============================================================================

  # IaC security (Terraform)
  - repo: https://github.com/bridgecrewio/checkov
    rev: 3.2.508
    hooks:
      - id: checkov
        files: ^deploy/terraform/
        args:
          [--quiet, --compact, --directory, deploy/terraform/, --soft-fail]

  # Secrets detection
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.0
    hooks:
      - id: gitleaks

  # =============================================================================
  # STAGE 3: Full verification (CI-equivalent)
  # =============================================================================

  - repo: local
    hooks:
      - id: gradle-check
        name: gradle check (build + test + static analysis + coverage)
        entry: bash -c 'cd backend && ./gradlew check -q'
        language: system
        files: ^backend/
        pass_filenames: false

      - id: openjml-esc
        name: openjml ESC (formal verification of JML contracts)
        entry: bash -c 'cd backend && ./gradlew openjmlEsc -q'
        language: system
        files: ^backend/src/main/java/com/keplerops/groundcontrol/domain/(requirements|adrs)/state/
        pass_filenames: false

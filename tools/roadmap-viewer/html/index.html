<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ground Control — Roadmap</title>
<script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --text-dim: #8b8fa3;
    --accent: #6c7ee1;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; }
  header h1 span { color: var(--text-dim); font-weight: 400; }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .controls label {
    font-size: 12px;
    color: var(--text-dim);
    margin-right: 4px;
  }
  select, button {
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 4px;
    font-size: 12px;
    cursor: pointer;
  }
  select:hover, button:hover { border-color: var(--accent); }

  .stats {
    display: flex;
    gap: 16px;
    padding: 8px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .stat {
    font-size: 11px;
    color: var(--text-dim);
  }
  .stat strong {
    color: var(--text);
    font-size: 13px;
    margin-right: 3px;
  }

  .legend {
    display: flex;
    gap: 12px;
    padding: 8px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--text-dim);
    cursor: pointer;
  }
  .legend-item:hover { color: var(--text); }
  .legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 2px;
    display: inline-block;
  }
  .legend-sep {
    color: var(--border);
    margin: 0 4px;
  }
  .legend-line {
    width: 24px;
    height: 0;
    border-top-width: 2px;
    border-top-style: solid;
    display: inline-block;
    vertical-align: middle;
  }
  .legend-line.dashed { border-top-style: dashed; }
  .legend-line.dotted { border-top-style: dotted; }

  #cy {
    flex: 1;
    background: var(--bg);
  }

  #tooltip {
    display: none;
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    max-width: 360px;
    font-size: 12px;
    z-index: 100;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    pointer-events: none;
  }
  .tt-uid {
    font-size: 11px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .tt-title {
    font-weight: 600;
    margin-bottom: 6px;
  }
  .tt-meta {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .tt-tag {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
  }
  .tt-statement {
    color: var(--text-dim);
    font-size: 11px;
    line-height: 1.4;
    max-height: 80px;
    overflow: hidden;
  }

  .loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 200;
    flex-direction: column;
    gap: 12px;
  }
  .loading .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading .msg { color: var(--text-dim); font-size: 13px; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loading" class="loading">
  <div class="spinner"></div>
  <div class="msg" id="loadMsg">Fetching requirements...</div>
</div>

<header>
  <h1>Ground Control <span>Roadmap</span></h1>
  <div class="controls">
    <label>Color by</label>
    <select id="colorBy">
      <option value="series">Series</option>
      <option value="priority">Priority</option>
      <option value="status" selected>Status</option>
      <option value="wave">Wave</option>
    </select>
    <label>Layout</label>
    <select id="layoutSelect">
      <option value="dagre-lr">DAG (left to right)</option>
      <option value="dagre-tb" selected>DAG (top to bottom)</option>
    </select>
    <button id="btnFit" title="Fit to screen">Fit</button>
    <button id="btnReset" title="Reset filters">Reset</button>
  </div>
</header>
<div class="stats" id="statsBar"></div>
<div class="legend" id="legendBar"></div>
<div id="cy"></div>
<div id="tooltip"></div>

<script>
const API = 'http://' + window.location.hostname + ':8000/api/v1';

const SERIES_COLORS = {
  A: '#6c7ee1', B: '#4ecdc4', C: '#f7b731', D: '#e056a0',
  E: '#45b7d1', F: '#96c93d', G: '#ff6b6b', H: '#c56cf0',
  I: '#786fa6', J: '#f19066', K: '#e77f67', L: '#574b90',
  M: '#e15f41', N: '#3dc1d3', O: '#ea8685', P: '#778beb',
  Q: '#cf6a87', R: '#63cdda', S: '#f8a5c2', T: '#f3a683',
  U: '#c44569', V: '#546de5', W: '#e66767', X: '#303952',
};
const PRIORITY_COLORS = {
  MUST: '#e74c3c', SHOULD: '#f39c12', COULD: '#3498db', WONT: '#7f8c8d'
};
const STATUS_COLORS = {
  DRAFT: '#7f8c8d', ACTIVE: '#2ecc71', DEPRECATED: '#e67e22', ARCHIVED: '#95a5a6'
};
const WAVE_COLORS = {
  1: '#e74c3c', 2: '#e67e22', 3: '#f1c40f', 4: '#2ecc71', 5: '#3498db',
  6: '#9b59b6', 7: '#1abc9c', 8: '#e91e63', 9: '#00bcd4'
};
const RELATION_STYLES = {
  DEPENDS_ON:     { color: '#6c7ee1', style: 'solid',   label: 'depends' },
  PARENT:         { color: '#4ecdc4', style: 'solid',   label: 'parent' },
  REFINES:        { color: '#f7b731', style: 'dashed',  label: 'refines' },
  CONFLICTS_WITH: { color: '#e74c3c', style: 'dotted',  label: 'conflicts' },
  SUPERSEDES:     { color: '#c56cf0', style: 'dashed',  label: 'supersedes' },
  RELATED:        { color: '#95a5a6', style: 'dotted',  label: 'related' },
};

let allRequirements = [];
let allRelations = [];
let cy;

function getSeries(uid) {
  const m = uid.match(/^GC-([A-Z])/);
  return m ? m[1] : '?';
}

function getNodeColor(req, scheme) {
  const series = getSeries(req.uid);
  switch (scheme) {
    case 'priority': return PRIORITY_COLORS[req.priority] || '#555';
    case 'status':   return STATUS_COLORS[req.status] || '#555';
    case 'wave':     return WAVE_COLORS[req.wave] || '#555';
    default:         return SERIES_COLORS[series] || '#555';
  }
}

function escapeText(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

async function fetchAllRequirements() {
  const reqs = [];
  let page = 0;
  let totalPages = 1;
  while (page < totalPages) {
    const resp = await fetch(`${API}/requirements?page=${page}&size=200`);
    const data = await resp.json();
    reqs.push(...data.content);
    totalPages = data.totalPages;
    page++;
  }
  return reqs;
}

async function fetchRelationsForReq(id) {
  const resp = await fetch(`${API}/requirements/${id}/relations`);
  return resp.json();
}

async function fetchAllRelations(requirements) {
  const batchSize = 20;
  const allRels = new Map();
  for (let i = 0; i < requirements.length; i += batchSize) {
    const batch = requirements.slice(i, i + batchSize);
    const results = await Promise.all(batch.map(r => fetchRelationsForReq(r.id)));
    results.flat().forEach(rel => allRels.set(rel.id, rel));
    document.getElementById('loadMsg').textContent =
      'Fetching relations... ' + Math.min(i + batchSize, requirements.length) + '/' + requirements.length;
  }
  return Array.from(allRels.values());
}

function buildGraph(colorScheme) {
  const nodes = allRequirements.map(r => ({
    data: {
      id: r.id,
      uid: r.uid,
      label: r.uid.replace('GC-', ''),
      title: r.title,
      statement: r.statement,
      priority: r.priority,
      status: r.status,
      type: r.requirementType,
      wave: r.wave || 0,
      series: getSeries(r.uid),
      color: getNodeColor(r, colorScheme),
    }
  }));

  const edges = allRelations.map(rel => ({
    data: {
      id: 'e-' + rel.id,
      source: rel.sourceId,
      target: rel.targetId,
      relType: rel.relationType,
      color: (RELATION_STYLES[rel.relationType] || RELATION_STYLES.RELATED).color,
      lineStyle: (RELATION_STYLES[rel.relationType] || RELATION_STYLES.RELATED).style,
    }
  }));

  return { nodes, edges };
}

function getLayoutConfig(layoutId) {
  if (layoutId === 'dagre-tb') {
    return { name: 'dagre', rankDir: 'BT', nodeSep: 30, rankSep: 60, edgeSep: 10 };
  }
  return { name: 'dagre', rankDir: 'RL', nodeSep: 30, rankSep: 60, edgeSep: 10 };
}

function buildTooltip(container, d) {
  container.replaceChildren();

  var uidDiv = document.createElement('div');
  uidDiv.className = 'tt-uid';
  uidDiv.textContent = d.uid;
  container.appendChild(uidDiv);

  var titleDiv = document.createElement('div');
  titleDiv.className = 'tt-title';
  titleDiv.textContent = d.title;
  container.appendChild(titleDiv);

  var metaDiv = document.createElement('div');
  metaDiv.className = 'tt-meta';

  var tags = [
    { text: d.priority, bg: PRIORITY_COLORS[d.priority] || '#555' },
    { text: d.status, bg: STATUS_COLORS[d.status] || '#555' },
    { text: 'Wave ' + d.wave, bg: '#6c7ee1' },
    { text: d.type, bg: '#4ecdc4' },
  ];
  tags.forEach(function(t) {
    var span = document.createElement('span');
    span.className = 'tt-tag';
    span.style.background = t.bg + '33';
    span.style.color = t.bg;
    span.textContent = t.text;
    metaDiv.appendChild(span);
  });
  container.appendChild(metaDiv);

  if (d.statement) {
    var stmtDiv = document.createElement('div');
    stmtDiv.className = 'tt-statement';
    stmtDiv.textContent = d.statement;
    container.appendChild(stmtDiv);
  }
}

function buildStatsBar(container) {
  container.replaceChildren();

  var waves = {};
  var seriesSet = {};
  allRequirements.forEach(function(r) {
    waves[r.wave || 0] = (waves[r.wave || 0] || 0) + 1;
    seriesSet[getSeries(r.uid)] = true;
  });

  var waveKeys = Object.keys(waves).sort(function(a, b) { return a - b; });
  var waveStr = waveKeys.map(function(w) { return 'W' + w + ':' + waves[w]; }).join(' ');

  var statData = [
    { val: allRequirements.length, label: 'requirements' },
    { val: allRelations.length, label: 'relations' },
    { val: Object.keys(seriesSet).length, label: 'series' },
    { val: waveKeys.length, label: 'waves' },
  ];

  statData.forEach(function(s) {
    var div = document.createElement('div');
    div.className = 'stat';
    var strong = document.createElement('strong');
    strong.textContent = s.val;
    div.appendChild(strong);
    div.appendChild(document.createTextNode(s.label));
    container.appendChild(div);
  });

  var waveDiv = document.createElement('div');
  waveDiv.className = 'stat';
  waveDiv.textContent = waveStr;
  container.appendChild(waveDiv);
}

function buildLegend(container, scheme) {
  container.replaceChildren();

  var counts = {};
  allRequirements.forEach(function(r) {
    var key;
    switch (scheme) {
      case 'priority': key = r.priority; break;
      case 'status': key = r.status; break;
      case 'wave': key = 'Wave ' + (r.wave || 0); break;
      default: key = getSeries(r.uid); break;
    }
    counts[key] = (counts[key] || 0) + 1;
  });

  var colorMap;
  if (scheme === 'priority') colorMap = PRIORITY_COLORS;
  else if (scheme === 'status') colorMap = STATUS_COLORS;
  else if (scheme === 'wave') {
    colorMap = {};
    Object.keys(WAVE_COLORS).forEach(function(k) { colorMap['Wave ' + k] = WAVE_COLORS[k]; });
  } else {
    colorMap = SERIES_COLORS;
  }

  var keys = Object.keys(counts).sort();
  keys.forEach(function(key) {
    var color = colorMap[key] || '#555';
    var item = document.createElement('div');
    item.className = 'legend-item';
    item.dataset.key = key;

    var swatch = document.createElement('span');
    swatch.className = 'legend-swatch';
    swatch.style.background = color;
    item.appendChild(swatch);
    item.appendChild(document.createTextNode(' ' + key + ' (' + counts[key] + ')'));
    container.appendChild(item);

    item.addEventListener('click', function() {
      cy.elements().removeClass('highlighted dimmed');
      var matchNodes = cy.nodes().filter(function(n) {
        switch (scheme) {
          case 'priority': return n.data('priority') === key;
          case 'status': return n.data('status') === key;
          case 'wave': return ('Wave ' + n.data('wave')) === key;
          default: return n.data('series') === key;
        }
      });
      if (matchNodes.length === 0) return;
      var neighborhood = matchNodes.union(matchNodes.connectedEdges());
      cy.elements().not(neighborhood).addClass('dimmed');
      neighborhood.addClass('highlighted');
    });
  });

  var sep = document.createElement('span');
  sep.className = 'legend-sep';
  sep.textContent = 'Edges:';
  sep.style.color = 'var(--text-dim)';
  sep.style.fontSize = '11px';
  sep.style.marginLeft = '8px';
  container.appendChild(sep);

  Object.keys(RELATION_STYLES).forEach(function(type) {
    var rs = RELATION_STYLES[type];
    var relCount = allRelations.filter(function(r) { return r.relationType === type; }).length;
    if (relCount > 0) {
      var item = document.createElement('div');
      item.className = 'legend-item';
      var line = document.createElement('span');
      line.className = 'legend-line';
      if (rs.style === 'dashed') line.classList.add('dashed');
      if (rs.style === 'dotted') line.classList.add('dotted');
      line.style.borderTopColor = rs.color;
      item.appendChild(line);
      item.appendChild(document.createTextNode(' ' + rs.label + ' (' + relCount + ')'));
      container.appendChild(item);
    }
  });
}

function renderGraph(colorScheme, layoutId) {
  var graphData = buildGraph(colorScheme);

  if (cy) cy.destroy();

  cy = cytoscape({
    container: document.getElementById('cy'),
    elements: graphData.nodes.concat(graphData.edges),
    style: [
      {
        selector: 'node',
        style: {
          'label': 'data(label)',
          'background-color': 'data(color)',
          'color': '#e1e4ed',
          'text-valign': 'center',
          'text-halign': 'center',
          'font-size': '9px',
          'font-weight': '600',
          'width': 50,
          'height': 26,
          'shape': 'round-rectangle',
          'border-width': 1,
          'border-color': 'data(color)',
          'text-outline-width': 0,
          'overlay-padding': 3,
        }
      },
      {
        selector: 'node:selected',
        style: { 'border-width': 2, 'border-color': '#fff' }
      },
      {
        selector: 'node.highlighted',
        style: { 'border-width': 2, 'border-color': '#fff', 'z-index': 10 }
      },
      {
        selector: 'node.dimmed',
        style: { 'opacity': 0.15 }
      },
      {
        selector: 'edge',
        style: {
          'width': 1.2,
          'line-color': 'data(color)',
          'target-arrow-color': 'data(color)',
          'target-arrow-shape': 'triangle',
          'arrow-scale': 0.7,
          'curve-style': 'bezier',
          'line-style': 'data(lineStyle)',
          'opacity': 0.6,
        }
      },
      {
        selector: 'edge.highlighted',
        style: { 'width': 2.5, 'opacity': 1, 'z-index': 10 }
      },
      {
        selector: 'edge.dimmed',
        style: { 'opacity': 0.06 }
      },
    ],
    layout: getLayoutConfig(layoutId),
    minZoom: 0.15,
    maxZoom: 4,
    wheelSensitivity: 0.3,
  });

  setupInteractions();
  buildStatsBar(document.getElementById('statsBar'));
  buildLegend(document.getElementById('legendBar'), colorScheme);
}

function setupInteractions() {
  var tooltip = document.getElementById('tooltip');

  cy.on('mouseover', 'node', function(evt) {
    buildTooltip(tooltip, evt.target.data());
    tooltip.style.display = 'block';
  });

  cy.on('mousemove', 'node', function(evt) {
    var x = evt.originalEvent.clientX;
    var y = evt.originalEvent.clientY;
    var pad = 12;
    var left = x + pad;
    var top = y + pad;
    if (left + 360 > window.innerWidth) left = x - 360 - pad;
    if (top + 200 > window.innerHeight) top = y - 200 - pad;
    tooltip.style.left = left + 'px';
    tooltip.style.top = top + 'px';
  });

  cy.on('mouseout', 'node', function() {
    tooltip.style.display = 'none';
  });

  cy.on('tap', 'node', function(evt) {
    var node = evt.target;
    if (node.hasClass('highlighted')) {
      cy.elements().removeClass('highlighted dimmed');
      return;
    }
    var neighborhood = node.closedNeighborhood();
    cy.elements().removeClass('highlighted dimmed');
    cy.elements().not(neighborhood).addClass('dimmed');
    neighborhood.addClass('highlighted');
  });

  cy.on('tap', function(evt) {
    if (evt.target === cy) {
      cy.elements().removeClass('highlighted dimmed');
    }
  });
}

document.getElementById('colorBy').addEventListener('change', function(e) {
  renderGraph(e.target.value, document.getElementById('layoutSelect').value);
});

document.getElementById('layoutSelect').addEventListener('change', function(e) {
  renderGraph(document.getElementById('colorBy').value, e.target.value);
});

document.getElementById('btnFit').addEventListener('click', function() {
  cy.fit(undefined, 30);
});

document.getElementById('btnReset').addEventListener('click', function() {
  cy.elements().removeClass('highlighted dimmed');
  cy.fit(undefined, 30);
});

async function main() {
  try {
    allRequirements = await fetchAllRequirements();
    document.getElementById('loadMsg').textContent =
      'Loaded ' + allRequirements.length + ' requirements. Fetching relations...';

    allRelations = await fetchAllRelations(allRequirements);

    document.getElementById('loading').style.display = 'none';
    renderGraph('status', 'dagre-tb');
  } catch (err) {
    var msg = document.getElementById('loadMsg');
    msg.textContent = 'Error: ' + err.message + '. Is the backend running on localhost:8000?';
    msg.style.color = '#e74c3c';
    console.error(err);
  }
}

main();
</script>
</body>
</html>

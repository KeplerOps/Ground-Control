# SonarCloud Configuration
# https://sonarcloud.io/project/overview?id=KeplerOps_Ground-Control

sonar.projectKey=KeplerOps_Ground-Control
sonar.organization=keplerops

# Source and test directories
sonar.sources=backend/src/main/java
sonar.tests=backend/src/test/java

# Exclusions
sonar.exclusions=\
  **/node_modules/**,\
  **/.gradle/**,\
  **/build/**,\
  **/dist/**,\
  **/coverage/**,\
  **/*.min.js

# Java
sonar.java.source=21
sonar.java.binaries=backend/build/classes

# Coverage
sonar.coverage.jacoco.xmlReportPaths=backend/build/reports/jacoco/test/jacocoTestReport.xml

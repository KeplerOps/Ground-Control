services:
  db:
    image: apache/age:release_PG16_1.6.0
    environment:
      POSTGRES_DB: ground_control
      POSTGRES_USER: gc
      POSTGRES_PASSWORD: gc
    ports:
      - "5432:5432"
    volumes:
      - gc-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gc -d ground_control"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  gc-postgres-data:

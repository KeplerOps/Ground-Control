[tool.towncrier]
# Per ADR-021 Phase B (amended by issue #848): per-PR changelog entries
# ship as fragments under `changelog.d/` so concurrent PRs cannot conflict
# on the same `CHANGELOG.md` line range. `towncrier build` collates them
# into the changelog at release time.
#
# `name` (not `package`) is used here because Ground Control is not an
# installable Python package — towncrier's `package` mode would resolve
# version/metadata via Python packaging and fail on a repo with no
# matching distribution. The Java/Spring backend + React frontend supply
# their own versions; `towncrier build --version <X.Y.Z>` is passed
# explicitly at release time.
name = "Ground Control"
directory = "changelog.d"
filename = "CHANGELOG.md"
template = "changelog.d/_template.md.jinja"
start_string = "<!-- towncrier release notes start -->\n"
issue_format = "(#{issue})"
title_format = "## [{version}] - {project_date}"
underlines = ["", "", ""]
wrap = true

# Keep-a-Changelog categories, in the order they should render under each
# release header. Singular names match the fragment-filename grammar
# enforced by `tools/policy/checks.py::parse_fragment_filename`.
[[tool.towncrier.type]]
directory = "security"
name = "Security"
showcontent = true

[[tool.towncrier.type]]
directory = "added"
name = "Added"
showcontent = true

[[tool.towncrier.type]]
directory = "changed"
name = "Changed"
showcontent = true

[[tool.towncrier.type]]
directory = "deprecated"
name = "Deprecated"
showcontent = true

[[tool.towncrier.type]]
directory = "removed"
name = "Removed"
showcontent = true

[[tool.towncrier.type]]
directory = "fixed"
name = "Fixed"
showcontent = true

name: SonarCloud Analysis
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  sonarcloud:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install uv
        uses: astral-sh/setup-uv@6b9c6063abd6010835c3544edc914d3eb8de545a # v6
      - name: Install backend dependencies
        run: cd backend && uv sync
      - name: Run tests with coverage
        run: cd backend && uv run pytest --cov=ground_control --cov-report=xml:coverage.xml
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

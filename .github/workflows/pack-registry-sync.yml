name: Pack Registry Sync

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Ground Control project identifier"
        required: true
        default: "ground-control"
      pack_ids:
        description: "Optional comma-separated pack IDs to sync"
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

jobs:
  sync:
    runs-on: [self-hosted, linux, x64]
    environment: dev
    env:
      AWS_REGION: us-east-2
      INSTANCE_PROJECT_TAG: ground-control
      PACK_REGISTRY_SECURITY_PARAM: /gc/dev/pack_registry_security_json
      PACK_REGISTRY_ADMIN_PRINCIPAL: github-actions-pack-admin
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4
        with:
          role-to-assume: arn:aws:iam::516608939870:role/github-actions-terraform
          aws-region: ${{ env.AWS_REGION }}

      - name: Write pack-registry security parameter
        env:
          GC_PACK_REGISTRY_ADMIN_TOKEN: ${{ secrets.GC_PACK_REGISTRY_ADMIN_TOKEN }}
        run: |
          if [ -z "${GC_PACK_REGISTRY_ADMIN_TOKEN}" ]; then
            echo "GC_PACK_REGISTRY_ADMIN_TOKEN secret is not configured."
            exit 1
          fi

          SPRING_JSON="$(jq -nc \
            --arg principal "${PACK_REGISTRY_ADMIN_PRINCIPAL}" \
            --arg token "${GC_PACK_REGISTRY_ADMIN_TOKEN}" \
            '{"ground-control":{"pack-registry":{"security":{"admin-credentials":[{"principal-name":$principal,"token":$token}]}}}}')"

          aws ssm put-parameter \
            --name "${PACK_REGISTRY_SECURITY_PARAM}" \
            --type SecureString \
            --value "${SPRING_JSON}" \
            --overwrite > /dev/null

      - name: Find EC2 instance
        id: ec2
        run: |
          INSTANCE_ID="$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=${INSTANCE_PROJECT_TAG}" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)"
          if [ "${INSTANCE_ID}" = "None" ] || [ -z "${INSTANCE_ID}" ]; then
            echo "No running ground-control instance found"
            exit 1
          fi
          echo "instance_id=${INSTANCE_ID}" >> "$GITHUB_OUTPUT"

      - name: Enable pack-registry auth on host
        env:
          INSTANCE_ID: ${{ steps.ec2.outputs.instance_id }}
        run: |
          RAW_BASE_URL="https://raw.githubusercontent.com/KeplerOps/Ground-Control/${GITHUB_SHA}"
          PARAMS_FILE="$(mktemp)"
          jq -nc \
            --arg cmd1 "curl -fsSL ${RAW_BASE_URL}/deploy/scripts/enable_pack_registry_auth.sh -o /tmp/enable_pack_registry_auth.sh" \
            --arg cmd2 "bash /tmp/enable_pack_registry_auth.sh ${PACK_REGISTRY_SECURITY_PARAM}" \
            '{commands: [$cmd1, $cmd2]}' > "${PARAMS_FILE}"

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --parameters "file://${PARAMS_FILE}" \
            --timeout-seconds 900 \
            --query 'Command.CommandId' \
            --output text)"

          for i in $(seq 1 180); do
            STATUS="$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --query 'Status' \
              --output text 2>/dev/null || echo Pending)"
            case "${STATUS}" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query 'StandardOutputContent' \
                  --output text
                exit 0
                ;;
              Failed|TimedOut|Cancelled)
                echo "Host enable step failed with status: ${STATUS}"
                echo "--- stdout ---"
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query 'StandardOutputContent' \
                  --output text
                echo "--- stderr ---"
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query 'StandardErrorContent' \
                  --output text
                exit 1
                ;;
            esac
            sleep 5
          done

          echo "Timed out waiting for host enable step"
          exit 1

      - name: Sync pack catalog on host
        env:
          INSTANCE_ID: ${{ steps.ec2.outputs.instance_id }}
        run: |
          RAW_BASE_URL="https://raw.githubusercontent.com/KeplerOps/Ground-Control/${GITHUB_SHA}"
          PARAMS_FILE="$(mktemp)"
          jq -nc \
            --arg cmd1 "curl -fsSL ${RAW_BASE_URL}/deploy/scripts/sync_pack_catalog.sh -o /tmp/sync_pack_catalog.sh" \
            --arg cmd2 "bash /tmp/sync_pack_catalog.sh ${RAW_BASE_URL} '${{ github.event.inputs.project }}' ${PACK_REGISTRY_SECURITY_PARAM} '${{ github.event.inputs.pack_ids }}' http://localhost:8000" \
            '{commands: [$cmd1, $cmd2]}' > "${PARAMS_FILE}"

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "${INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --parameters "file://${PARAMS_FILE}" \
            --timeout-seconds 1800 \
            --query 'Command.CommandId' \
            --output text)"

          for i in $(seq 1 240); do
            STATUS="$(aws ssm get-command-invocation \
              --command-id "${COMMAND_ID}" \
              --instance-id "${INSTANCE_ID}" \
              --query 'Status' \
              --output text 2>/dev/null || echo Pending)"
            case "${STATUS}" in
              Success)
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query 'StandardOutputContent' \
                  --output text
                exit 0
                ;;
              Failed|TimedOut|Cancelled)
                echo "Pack sync failed with status: ${STATUS}"
                echo "--- stdout ---"
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query 'StandardOutputContent' \
                  --output text
                echo "--- stderr ---"
                aws ssm get-command-invocation \
                  --command-id "${COMMAND_ID}" \
                  --instance-id "${INSTANCE_ID}" \
                  --query 'StandardErrorContent' \
                  --output text
                exit 1
                ;;
            esac
            sleep 5
          done

          echo "Timed out waiting for pack sync step"
          exit 1

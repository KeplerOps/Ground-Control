name: CI

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write
  pull-requests: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Backend — build → test → integration (linear, always runs)
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@06832c7b30a0129d7fb559bcc6e43d26f6374244 # v4
      - name: Build
        run: cd backend && ./gradlew build -x test --no-daemon
      - name: Check formatting
        run: cd backend && ./gradlew spotlessCheck --no-daemon

  test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@06832c7b30a0129d7fb559bcc6e43d26f6374244 # v4
      - name: Run unit tests
        run: cd backend && ./gradlew check --no-daemon
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-report
          path: backend/build/reports/tests/test/

  integration:
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@06832c7b30a0129d7fb559bcc6e43d26f6374244 # v4
      - name: Run integration tests
        run: cd backend && ./gradlew integrationTest --no-daemon
      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: integration-test-report
          path: backend/build/reports/tests/integrationTest/

  # ---------------------------------------------------------------------------
  # Verification (branches off test, runs in parallel with integration)
  # ---------------------------------------------------------------------------
  verify:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@06832c7b30a0129d7fb559bcc6e43d26f6374244 # v4
      - name: OpenJML Extended Static Checking
        run: cd backend && ./gradlew openjmlEsc --no-daemon

  # ---------------------------------------------------------------------------
  # Analysis (non-blocking)
  # ---------------------------------------------------------------------------
  sonarcloud:
    runs-on: ubuntu-latest
    needs: [test, integration]
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@06832c7b30a0129d7fb559bcc6e43d26f6374244 # v4
      - name: Build and test with coverage
        run: cd backend && ./gradlew test integrationTest jacocoTestReport --no-daemon
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ---------------------------------------------------------------------------
  # Docker — builds after integration tests and verification both complete
  # ---------------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: [integration, verify]
    if: |
      github.event_name == 'push'
      && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4
        with:
          role-to-assume: arn:aws:iam::516608939870:role/github-actions-terraform
          aws-region: us-east-2

      - name: Login to ECR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: 516608939870.dkr.ecr.us-east-2.amazonaws.com

      - id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5
        with:
          images: |
            ghcr.io/keplerops/ground-control
            516608939870.dkr.ecr.us-east-2.amazonaws.com/ground-control
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Smoke test — validates Docker image starts, Flyway migrates, health is UP
  # ---------------------------------------------------------------------------
  smoke:
    runs-on: ubuntu-latest
    needs: [docker]
    if: needs.docker.result == 'success'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ground_control
          POSTGRES_USER: gc
          POSTGRES_PASSWORD: gc
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build image
        run: docker build -t gc-smoke -f backend/Dockerfile .

      - name: Run image and verify Flyway + health
        run: |
          docker run -d --name gc-smoke \
            --network host \
            -e GC_DATABASE_URL=jdbc:postgresql://localhost:5432/ground_control \
            -e GC_DATABASE_USER=gc \
            -e GC_DATABASE_PASSWORD=gc \
            gc-smoke

          echo "Waiting for application startup..."
          for i in $(seq 1 60); do
            HEALTH=$(curl -sf http://localhost:8000/actuator/health 2>/dev/null) && {
              echo "Smoke test passed: $HEALTH"
              exit 0
            }
            sleep 2
          done

          echo "Smoke test failed after 120s"
          docker logs gc-smoke
          exit 1

  # ---------------------------------------------------------------------------
  # Deploy — pushes to main trigger deploy to EC2 via SSM SendCommand
  # ---------------------------------------------------------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: [smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@ececac1a45f3b08a01d2dd070d28d111c5fe6722 # v4
        with:
          role-to-assume: arn:aws:iam::516608939870:role/github-actions-terraform
          aws-region: us-east-2

      - name: Find EC2 instance
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Project,Values=ground-control" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)
          if [ "$INSTANCE_ID" = "None" ] || [ -z "$INSTANCE_ID" ]; then
            echo "No running ground-control instance found"
            exit 1
          fi
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Deploy via SSM
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["/opt/gc/deploy.sh"]' \
            --timeout-seconds 660 \
            --query 'Command.CommandId' \
            --output text)
          echo "command_id=$COMMAND_ID" >> "$GITHUB_OUTPUT"
        env:
          INSTANCE_ID: ${{ steps.ec2.outputs.instance_id }}

      - name: Wait for deploy to complete
        run: |
          for i in $(seq 1 140); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success)
                echo "Deploy succeeded"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query 'StandardOutputContent' \
                  --output text
                exit 0
                ;;
              Failed|TimedOut|Cancelled)
                echo "Deploy failed with status: $STATUS"
                echo "--- stdout ---"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query 'StandardOutputContent' \
                  --output text
                echo "--- stderr ---"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$INSTANCE_ID" \
                  --query 'StandardErrorContent' \
                  --output text
                exit 1
                ;;
            esac
            sleep 5
          done
          echo "Timed out waiting for deploy"
          exit 1
        env:
          COMMAND_ID: ${{ steps.ssm.outputs.command_id }}
          INSTANCE_ID: ${{ steps.ec2.outputs.instance_id }}

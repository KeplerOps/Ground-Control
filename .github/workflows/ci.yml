name: CI

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write
  pull-requests: write
  id-token: write

jobs:
  policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Show Python version
        run: python3 --version
      - name: Policy tool tests
        run: python3 -m unittest discover -s tools/tests -p 'test_*.py'
      - name: Repo policy checks
        if: github.event_name == 'pull_request'
        run: python3 bin/policy --base "origin/${{ github.base_ref }}"
      - name: Repo policy checks (push)
        if: github.event_name != 'pull_request'
        run: python3 bin/policy --skip-pr-body

  policy-live:
    # Deliberate exception to the github-hosted default. `vars.GC_BASE_URL`
    # is expected to point at the tailnet-only Ground Control instance on
    # red-dragon (per ADR-030); github-hosted runners can't reach it. If
    # `GC_BASE_URL` is later pointed at a public-reachable instance, this
    # can move to ubuntu-latest. Currently the var is unset so this job
    # is skipped on every PR, but the runner choice has to match the
    # intended target, not the empty-default behavior.
    runs-on: [self-hosted, linux, x64]
    needs: [policy]
    if: vars.GC_BASE_URL != ''
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install MCP helper dependencies
        run: npm --prefix mcp/ground-control ci
      - name: Live Ground Control ADR drift check
        env:
          GC_BASE_URL: ${{ vars.GC_BASE_URL }}
        run: node tools/ground_control/check_adr_drift.mjs
      - name: Live Ground Control policy check
        env:
          GC_BASE_URL: ${{ vars.GC_BASE_URL }}
        run: node tools/ground_control/check_live_policy.mjs

  # ---------------------------------------------------------------------------
  # Backend — build → test → integration (linear, always runs)
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    needs: [policy]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@06832c7b30a0129d7fb559bcc6e43d26f6374244 # v4
      - name: Build
        run: cd backend && ./gradlew build -x test --no-daemon
      - name: Check formatting
        run: cd backend && ./gradlew spotlessCheck --no-daemon

  test:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@06832c7b30a0129d7fb559bcc6e43d26f6374244 # v4
      - name: Run unit tests
        run: cd backend && ./gradlew check --no-daemon
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-report
          path: backend/build/reports/tests/test/

  integration:
    runs-on: ubuntu-latest
    needs: [build, test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@06832c7b30a0129d7fb559bcc6e43d26f6374244 # v4
      - name: Run integration tests
        run: cd backend && ./gradlew integrationTest --no-daemon
      - name: Upload integration test report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: integration-test-report
          path: backend/build/reports/tests/integrationTest/

  # ---------------------------------------------------------------------------
  # SonarCloud — runs after test for coverage data, fails CI if quality gate red
  # ---------------------------------------------------------------------------
  sonar:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@06832c7b30a0129d7fb559bcc6e43d26f6374244 # v4
      - name: Cache SonarCloud packages
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: cd backend && ./gradlew build sonar -Dsonar.qualitygate.wait=true --no-daemon

  # ---------------------------------------------------------------------------
  # Verification (branches off test, runs in parallel with integration)
  # ---------------------------------------------------------------------------
  verify:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@06832c7b30a0129d7fb559bcc6e43d26f6374244 # v4
      - name: OpenJML Extended Static Checking
        run: cd backend && ./gradlew openjmlEsc --no-daemon

  # ---------------------------------------------------------------------------
  # Docker — builds after integration, verify, and sonar all pass.
  # `sonar` is part of the gate (not just informational): a quality-gate
  # failure must block deploy, so docker can't proceed without it.
  # ---------------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    needs: [integration, verify, sonar]
    if: |
      github.event_name == 'push'
      && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3

      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5
        with:
          images: |
            ghcr.io/keplerops/ground-control
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Smoke test — validates Docker image starts, Flyway migrates, health is UP
  # ---------------------------------------------------------------------------
  smoke:
    runs-on: ubuntu-latest
    needs: [docker]
    if: needs.docker.result == 'success'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ground_control
          POSTGRES_USER: gc
          POSTGRES_PASSWORD: gc
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build image
        run: docker build -t gc-smoke -f backend/Dockerfile .

      - name: Run image and verify Flyway + health
        run: |
          docker run -d --name gc-smoke \
            --network host \
            -e GC_DATABASE_URL=jdbc:postgresql://localhost:5432/ground_control \
            -e GC_DATABASE_USER=gc \
            -e GC_DATABASE_PASSWORD=gc \
            gc-smoke

          echo "Waiting for application startup..."
          for i in $(seq 1 60); do
            HEALTH=$(curl -sf http://localhost:8000/actuator/health 2>/dev/null) && {
              echo "Smoke test passed: $HEALTH"
              exit 0
            }
            sleep 2
          done

          echo "Smoke test failed after 120s"
          docker logs gc-smoke
          exit 1

  # ---------------------------------------------------------------------------
  # Deploy — pushes to main SSH into red-dragon (Hetzner, tailnet-only) and
  # invoke a forced-command deploy script that pulls the latest GHCR image
  # and brings the compose stack up. The runner reaches red-dragon over the
  # tailnet via fabricator-side Tailscale integration — no public SSH on
  # red-dragon. See ADR-030.
  # ---------------------------------------------------------------------------
  deploy:
    # Deliberate exception to the github-hosted default. The deploy job
    # SSHes into red-dragon over the tailnet (per ADR-030); github-hosted
    # runners aren't on the tailnet by default, so this stays on the
    # fabricator-managed self-hosted runner pool that joins the tailnet
    # via cloud-init. If/when we add `tailscale/github-action` and the
    # required Tailscale OAuth secret to this repo, this job can move to
    # ubuntu-latest too — until then, leave it on self-hosted.
    runs-on: [self-hosted, linux, x64]
    needs: [smoke]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - name: Install deploy SSH key
        env:
          DEPLOY_KEY: ${{ secrets.RED_DRAGON_DEPLOY_KEY }}
          KNOWN_HOSTS: ${{ secrets.RED_DRAGON_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          umask 077
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/red-dragon-deploy
          printf '%s\n' "$KNOWN_HOSTS" > ~/.ssh/red-dragon-known-hosts

      - name: Wait for tailnet readiness
        # The runner VM joins the tailnet at first boot via fabricator's
        # cloud-init; tailscaled is normally ready by the time this job
        # starts, but cap the wait at 30s so a misconfigured runner fails
        # loudly instead of stalling the deploy job.
        run: |
          for i in $(seq 1 30); do
            if tailscale status >/dev/null 2>&1; then
              echo "tailnet ready"
              exit 0
            fi
            sleep 1
          done
          echo "ERROR: tailnet did not come up within 30s — runner may be missing the FABRICATOR_TAILSCALE_AUTHKEY env on aurora"
          exit 1

      - name: Deploy via SSH (gc-deploy@red-dragon, forced command)
        run: |
          ssh \
            -i ~/.ssh/red-dragon-deploy \
            -o UserKnownHostsFile=~/.ssh/red-dragon-known-hosts \
            -o StrictHostKeyChecking=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=15 \
            gc-deploy@red-dragon
          # No command argument is sent — the gc-deploy authorized_keys
          # entry uses ``command="/opt/gc/deploy.sh",restrict``, which forces
          # the deploy script and ignores any argv. SSH exit code is the
          # deploy script's exit code.

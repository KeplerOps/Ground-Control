spring:
  flyway:
    enabled: true

  jpa:
    hibernate:
      ddl-auto: validate

# Test profile: MockMvc never speaks HTTPS, so Secure-cookie must be off or session cookies are
# stripped before assertions can see them.
server:
  servlet:
    session:
      cookie:
        secure: false

groundcontrol:
  security:
    enabled: false
    openapi-public: true

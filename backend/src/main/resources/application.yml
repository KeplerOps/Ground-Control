spring:
  application:
    name: ground-control

  datasource:
    url: ${GC_DATABASE_URL:jdbc:postgresql://localhost:5432/ground_control}
    username: ${GC_DATABASE_USER:gc}
    password: ${GC_DATABASE_PASSWORD:gc}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: ${GC_CACHE_TYPE:none}

  data:
    redis:
      url: ${GC_REDIS_URL:redis://localhost:6379}

server:
  port: ${GC_SERVER_PORT:8000}
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

groundcontrol:
  age:
    enabled: ${GC_AGE_ENABLED:false}
    graph-name: ${GC_AGE_GRAPH_NAME:workflows}
  scheduler:
    enabled: ${GC_SCHEDULER_ENABLED:false}
    poll-interval-ms: ${GC_SCHEDULER_POLL_MS:60000}
  execution:
    thread-pool-size: ${GC_EXECUTION_THREADS:4}
    default-timeout-seconds: ${GC_EXECUTION_TIMEOUT:3600}

springdoc:
  api-docs:
    path: /api/openapi.json
  swagger-ui:
    path: /api/docs

spring:
  application:
    name: ground-control

  datasource:
    url: ${GC_DATABASE_URL:jdbc:postgresql://localhost:5432/ground_control}
    username: ${GC_DATABASE_USER:gc}
    password: ${GC_DATABASE_PASSWORD:gc}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
      org.hibernate.envers:
        audit_table_suffix: _audit

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: ${GC_CACHE_TYPE:none}

  data:
    redis:
      url: ${GC_REDIS_URL:redis://localhost:6379}

server:
  port: ${GC_SERVER_PORT:8000}
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

groundcontrol:
  github:
    gh-path: ${GC_GH_PATH:}
  age:
    enabled: ${GC_AGE_ENABLED:false}
    graph-name: ${GC_AGE_GRAPH_NAME:requirements}
  sweep:
    enabled: ${GC_SWEEP_ENABLED:false}
    cron: ${GC_SWEEP_CRON:0 0 6 * * *}
    github:
      enabled: ${GC_SWEEP_GITHUB_ENABLED:false}
      repo: ${GC_SWEEP_GITHUB_REPO:}
      labels: ${GC_SWEEP_GITHUB_LABELS:analysis-sweep}
    webhook:
      enabled: ${GC_SWEEP_WEBHOOK_ENABLED:false}
      url: ${GC_SWEEP_WEBHOOK_URL:}
  embedding:
    provider: ${GC_EMBEDDING_PROVIDER:none}
    api-key: ${GC_EMBEDDING_API_KEY:}
    api-url: ${GC_EMBEDDING_API_URL:https://api.openai.com/v1}
    model: ${GC_EMBEDDING_MODEL:text-embedding-3-small}
    dimensions: ${GC_EMBEDDING_DIMENSIONS:1536}
    batch-size: ${GC_EMBEDDING_BATCH_SIZE:100}

springdoc:
  api-docs:
    path: /api/openapi.json
  swagger-ui:
    path: /api/docs

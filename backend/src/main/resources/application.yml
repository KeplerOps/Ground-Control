spring:
  application:
    name: ground-control

  datasource:
    url: ${GC_DATABASE_URL:jdbc:postgresql://localhost:5432/ground_control}
    username: ${GC_DATABASE_USER:gc}
    password: ${GC_DATABASE_PASSWORD:gc}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
      org.hibernate.envers:
        audit_table_suffix: _audit

  flyway:
    enabled: true
    locations: classpath:db/migration

  cache:
    type: ${GC_CACHE_TYPE:none}

  data:
    redis:
      url: ${GC_REDIS_URL:redis://localhost:6379}

server:
  port: ${GC_SERVER_PORT:8000}
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /api/openapi.json
  swagger-ui:
    path: /api/docs
